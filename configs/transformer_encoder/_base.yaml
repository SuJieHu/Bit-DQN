# Shared backbone settings inherited by every transformer_encoder_*
# variant (the encoder-only Transformer). NOT runnable on its own (no
# algorithmic switches set here, no GPU-launch script). Files under
# transformer_encoder/ that extend this one only need to override the
# trick switches and the variant name.
extends: default.yaml

arch: transformer_encoder
transformer_heads: 4
transformer_layers: 2
transformer_dropout: 0.0
hidden_dim: 128
