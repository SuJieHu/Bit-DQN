# Shared backbone settings for every transformer_* variant (the *full*
# encoder-decoder Transformer). Identical to transformer_encoder/_base.yaml
# except for arch -> transformer, which selects the seq2seq Q-network
# (bidirectional encoder over target + causal decoder with cross-attention)
# in src/models/transformer_q.py.
# NOT runnable on its own.
extends: default.yaml

arch: transformer
transformer_heads: 4
transformer_layers: 2
transformer_dropout: 0.0
hidden_dim: 128
